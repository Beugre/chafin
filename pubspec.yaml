name: chafin_loans
description: "Application de prêts entre particuliers"
publish_to: "none"

version: 1.0.0+6

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.8
  go_router: ^14.2.7

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2

  # State Management
  provider: ^6.1.2

  # Forms & Validation
  formz: ^0.7.0

  # Serialization
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  http: ^1.1.0

  # PDF Generation
  pdf: ^3.11.1
  # printing: ^5.13.2

  # File handling
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  firebase_messaging: ^15.2.10
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

# Configuration pour flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

# Configuration pour flutter_native_splash
flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/logo.png"
  color_dark: "#000000"
  image_dark: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    color: "#ffffff"
